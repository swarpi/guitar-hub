# ---- Deployment ----
# 1. Create the D1 database:
#      wrangler d1 create guitar-hub
# 2. Replace database_id below with the ID from step 1.
# 3. Run the initial migration:
#      wrangler d1 execute guitar-hub --file=migrations/0000_initial.sql
# 4. Build for Cloudflare:
#      pnpm pages:build
# 5. Deploy:
#      wrangler pages deploy .vercel/output/static
# ---------------------

name = "guitar-hub"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "guitar-hub-db"
database_id = "your-d1-database-id" # Replace with actual ID from `wrangler d1 create`
