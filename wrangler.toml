# ---- Deployment ----
# The production D1 database is named "guitar-hub" (D1 does not support
# renaming; the app name changed to Music Hub but the database keeps its
# original name). The Pages project is also "guitar-hub", so deploys must
# pass --project-name=guitar-hub explicitly.
# 1. Run pending migrations against production:
#      wrangler d1 execute guitar-hub --remote --file=migrations/<file>.sql
# 2. Build for Cloudflare:
#      pnpm pages:build
# 3. Deploy:
#      wrangler pages deploy --project-name=guitar-hub
# ---------------------

name = "music-hub"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "guitar-hub"
database_id = "84c8f3de-9356-42d0-8f7f-a3ea2a50361e"
