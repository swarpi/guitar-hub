<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram · layered hand-drawn</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ffffff;--ink:#16130f;--body:#403a33;--muted:#7b7268;--faint:#a79d90;--line:#ece7df;
    --accent:#b0512f;--draw:#1f1c18;--bound:#c2b8a8;
    --sans:'Public Sans',sans-serif;--mono:'JetBrains Mono',monospace;--hand:'Kalam',cursive;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--body);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:52px 38px}
  .kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  h1{font-size:33px;font-weight:700;letter-spacing:-.025em;color:var(--ink);margin-bottom:6px}
  .sub{color:var(--muted);font-size:16px;margin-bottom:24px;max-width:60ch}
  .figframe{border:1px solid var(--line);padding:10px 6px 2px}
  .label{fill:var(--ink);font-family:var(--hand);font-size:18px}
  .num{fill:var(--draw);font-family:var(--hand);font-size:16px;font-weight:700}
  .num.a{fill:var(--accent)}
  .tier{fill:var(--muted);font-family:var(--hand);font-size:15px;letter-spacing:.06em;text-transform:uppercase}
  .tag{fill:var(--faint);font-family:var(--hand);font-size:15px}
  .tag.a{fill:var(--accent)}
  .cap{font-family:var(--mono);font-size:11.5px;color:var(--faint);letter-spacing:.04em;text-align:center;padding:12px 0 6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">System Architect · component map</div>
  <h1>Realtime STATUS — layered view</h1>
  <div class="sub">The same request &amp; stream path, grouped into tiers so the layers read at a glance.</div>
  <div class="figframe">
  <svg viewBox="0 0 980 600" width="100%" font-family="'Kalam',cursive">
    <defs>
      <filter id="rough" x="-3%" y="-3%" width="106%" height="106%">
        <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <marker id="ah" markerWidth="16" markerHeight="14" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M1,1 L10,4.5 L1,8" fill="none" stroke="var(--draw)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="aha" markerWidth="16" markerHeight="14" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M1,1 L10,4.5 L1,8" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- lane background bands (crisp, behind) -->
    <g stroke="none">
      <rect x="120" y="150" width="820" height="112" fill="#faf6f0"/>
      <rect x="120" y="280" width="820" height="112" fill="#fcfbf8"/>
      <rect x="120" y="410" width="820" height="112" fill="#faf6f0"/>
    </g>

    <!-- sketchy shapes -->
    <g filter="url(#rough)" fill="none" stroke="var(--draw)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <!-- data-center boundary around server tiers -->
      <rect x="120" y="150" width="820" height="372" rx="16" stroke="var(--bound)" stroke-width="1.6" stroke-dasharray="7 6"/>
      <!-- lane dividers -->
      <line x1="120" y1="262" x2="940" y2="262" stroke="var(--bound)" stroke-width="1.3" stroke-dasharray="4 6"/>
      <line x1="120" y1="392" x2="940" y2="392" stroke="var(--bound)" stroke-width="1.3" stroke-dasharray="4 6"/>
      <!-- boxes -->
      <g fill="#ffffff">
        <rect x="225" y="50" width="150" height="56" rx="8"/>   <!-- client -->
        <rect x="565" y="50" width="150" height="56" rx="8"/>   <!-- DNS -->
        <rect x="225" y="178" width="150" height="56" rx="8"/>  <!-- load balancer -->
        <rect x="565" y="178" width="150" height="56" rx="8"/>  <!-- rate limiter -->
        <rect x="160" y="308" width="150" height="56" rx="8"/>  <!-- web server -->
        <rect x="355" y="308" width="150" height="56" rx="8"/>  <!-- app server -->
        <rect x="550" y="308" width="150" height="56" rx="8"/>  <!-- SSE stream -->
        <rect x="745" y="308" width="150" height="56" rx="8"/>  <!-- git watcher -->
        <rect x="225" y="438" width="150" height="56" rx="8"/>  <!-- metadata db -->
        <rect x="485" y="438" width="150" height="56" rx="8"/>  <!-- message queue -->
      </g>
      <!-- edges -->
      <line x1="375" y1="78" x2="563" y2="78" marker-end="url(#ah)"/>
      <line x1="300" y1="106" x2="300" y2="176" marker-end="url(#ah)"/>
      <line x1="375" y1="206" x2="563" y2="206" marker-end="url(#ah)"/>
      <path d="M300,234 C 290,270 250,278 240,306" marker-end="url(#ah)"/>
      <line x1="310" y1="336" x2="353" y2="336" marker-end="url(#ah)"/>
      <path d="M430,364 C 420,400 330,408 308,436" marker-end="url(#ah)"/>
      <path d="M820,364 C 820,410 660,466 638,466" marker-end="url(#ah)"/>
      <path d="M560,438 C 580,405 605,400 622,366" marker-end="url(#ah)"/>
      <!-- accent stream back to client -->
      <path d="M625,308 C 625,175 470,150 362,108" stroke="var(--accent)" stroke-dasharray="6 5" marker-end="url(#aha)"/>
    </g>

    <!-- crisp text -->
    <g text-anchor="middle">
      <text class="label" x="300" y="84">client</text>
      <text class="label" x="640" y="84">DNS</text>
      <text class="label" x="300" y="212">load balancer</text>
      <text class="label" x="640" y="212">rate limiter</text>
      <text class="label" x="235" y="342">web server</text>
      <text class="label" x="430" y="342">app server</text>
      <text class="label" x="625" y="342">SSE stream</text>
      <text class="label" x="820" y="342">git watcher</text>
      <text class="label" x="300" y="461">metadata</text>
      <text class="label" x="300" y="481">database</text>
      <text class="label" x="560" y="461">message</text>
      <text class="label" x="560" y="481">queue</text>
      <!-- numbers -->
      <text class="num" x="470" y="68">1</text>
      <text class="num" x="312" y="146">2</text>
      <text class="num" x="470" y="196">3</text>
      <text class="num" x="248" y="280">4</text>
      <text class="num" x="332" y="328">5</text>
      <text class="num" x="350" y="408">6</text>
      <text class="num" x="712" y="424">7</text>
      <text class="num" x="612" y="408">8</text>
      <text class="num a" x="556" y="250">9</text>
    </g>
    <!-- tier labels (left gutter) -->
    <g text-anchor="start">
      <text class="tier" x="26" y="83">Client</text>
      <text class="tier" x="26" y="211">Edge</text>
      <text class="tier" x="26" y="341">Backend</text>
      <text class="tier" x="26" y="470">Data</text>
      <text class="tag a" x="922" y="510" text-anchor="end">data center</text>
    </g>
  </svg>
  </div>
  <div class="cap">FIG. 1 — edges 1–8 serve the request top-down; the open stream (9) pushes agent writes back up to the client</div>
</div>
</body>
</html>
